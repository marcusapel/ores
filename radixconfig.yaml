# ── radixconfig.yaml ─────────────────────────────────────────────────
# Omnia Radix deployment configuration for ORES
# Docs: https://www.radix.equinor.com/references/reference-radix-config/
# ─────────────────────────────────────────────────────────────────────
apiVersion: radix.equinor.com/v1
kind: RadixApplication
metadata:
  name: ores
spec:
  # ── Build ─────────────────────────────────────────────────────────
  build:
    useBuildKit: true

  environments:
    - name: dev
      build:
        from: main
    - name: prod
      build:
        from: release

  # ── Components ─────────────────────────────────────────────────────
  components:
    - name: web
      src: "."
      dockerfileName: Dockerfile
      ports:
        - name: http
          port: 8000
      publicPort: http
      monitoringConfig:
        portName: http

      # Resource limits — bumped for in-process WeCo C++ correlation engine
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "2Gi"

      # Replicas per environment
      environmentConfig:
        - environment: dev
          replicas: 1
          variables:
            LOG_LEVEL: "INFO"
            DEBUG: "False"
            HTTPS_ONLY: "true"
            DEFAULT_DATASPACE: "maap/drogon"
            WECO_DEFAULT_DATASPACE: "maap/weco"
            APP_KEY: "ores"
            DEFAULT_INSTANCE: "eqndev"
            # WeCo job routing: datasets above this well count → job pod
            WECO_JOB_WELL_THRESHOLD: "15"
            WECO_JOB_SCHEDULER_URL: "http://weco-correlation:8001"
            # eqndev - Equinor SWE dev, per-user PKCE (default)
            INSTANCE_EQNDEV_AUTH_MODE: "per_user_pkce"
            INSTANCE_EQNDEV_HOSTNAME: "equinorswedev.energy.azure.com"
            INSTANCE_EQNDEV_DATA_PARTITION_ID: "dev"
            INSTANCE_EQNDEV_AUTHORITY: "osdu"
            INSTANCE_EQNDEV_SCHEMA_SOURCE: "wks"
            INSTANCE_EQNDEV_DEFAULT_LEGAL_TAG: "dev-equinor-private-default"
            INSTANCE_EQNDEV_DEFAULT_OWNERS: "data.default.owners@dev.dataservices.energy"
            INSTANCE_EQNDEV_DEFAULT_VIEWERS: "data.default.viewers@dev.dataservices.energy"
            INSTANCE_EQNDEV_DEFAULT_COUNTRIES: "NO"
            # preship - Microsoft pre-ship M26
            INSTANCE_PRESHIP_HOSTNAME: "osdu-ship.msft-osdu-test.org"
            INSTANCE_PRESHIP_DATA_PARTITION_ID: "opendes"
            INSTANCE_PRESHIP_AUTHORITY: "osdu"
            INSTANCE_PRESHIP_SCHEMA_SOURCE: "wks"
            INSTANCE_PRESHIP_DEFAULT_LEGAL_TAG: "opendes-RDDMS-LegalTag"
            INSTANCE_PRESHIP_DEFAULT_OWNERS: "data.default.owners@opendes.contoso.com"
            INSTANCE_PRESHIP_DEFAULT_VIEWERS: "data.default.viewers@opendes.contoso.com"
            INSTANCE_PRESHIP_DEFAULT_COUNTRIES: "US"
            # interop - ADME Interop (client_credentials)
            INSTANCE_INTEROP_AUTH_MODE: "client_credentials"
            INSTANCE_INTEROP_HOSTNAME: "admeinterop.energy.azure.com"
            INSTANCE_INTEROP_DATA_PARTITION_ID: "opendes"
            INSTANCE_INTEROP_AUTHORITY: "osdu"
            INSTANCE_INTEROP_SCHEMA_SOURCE: "wks"
            INSTANCE_INTEROP_TOKEN_URL: "https://login.microsoftonline.com/58975fd3-4977-44d0-bea8-37af0baac100/oauth2/v2.0/token"
            INSTANCE_INTEROP_DEFAULT_LEGAL_TAG: "opendes-private-default"
            INSTANCE_INTEROP_DEFAULT_OWNERS: "data.default.owners@opendes.dataservices.energy"
            INSTANCE_INTEROP_DEFAULT_VIEWERS: "data.default.viewers@opendes.dataservices.energy"
            INSTANCE_INTEROP_DEFAULT_COUNTRIES: "NO"
          monitoring: true

        - environment: prod
          replicas: 2
          variables:
            LOG_LEVEL: "WARNING"
            DEBUG: "False"
            HTTPS_ONLY: "true"
            DEFAULT_DATASPACE: "maap/drogon"
            WECO_DEFAULT_DATASPACE: "maap/weco"
            APP_KEY: "ores-prod"
            DEFAULT_INSTANCE: "eqndev"
            # eqndev - Equinor SWE dev, per-user PKCE (default)
            INSTANCE_EQNDEV_AUTH_MODE: "per_user_pkce"
            INSTANCE_EQNDEV_HOSTNAME: "equinorswedev.energy.azure.com"
            INSTANCE_EQNDEV_DATA_PARTITION_ID: "dev"
            INSTANCE_EQNDEV_AUTHORITY: "osdu"
            INSTANCE_EQNDEV_SCHEMA_SOURCE: "wks"
            INSTANCE_EQNDEV_DEFAULT_LEGAL_TAG: "dev-equinor-private-default"
            INSTANCE_EQNDEV_DEFAULT_OWNERS: "data.default.owners@dev.dataservices.energy"
            INSTANCE_EQNDEV_DEFAULT_VIEWERS: "data.default.viewers@dev.dataservices.energy"
            INSTANCE_EQNDEV_DEFAULT_COUNTRIES: "NO"
            # preship - Microsoft pre-ship M26
            INSTANCE_PRESHIP_HOSTNAME: "osdu-ship.msft-osdu-test.org"
            INSTANCE_PRESHIP_DATA_PARTITION_ID: "opendes"
            INSTANCE_PRESHIP_AUTHORITY: "osdu"
            INSTANCE_PRESHIP_SCHEMA_SOURCE: "wks"
            INSTANCE_PRESHIP_DEFAULT_LEGAL_TAG: "opendes-RDDMS-LegalTag"
            INSTANCE_PRESHIP_DEFAULT_OWNERS: "data.default.owners@opendes.contoso.com"
            INSTANCE_PRESHIP_DEFAULT_VIEWERS: "data.default.viewers@opendes.contoso.com"
            INSTANCE_PRESHIP_DEFAULT_COUNTRIES: "US"
            # interop - ADME Interop (client_credentials)
            INSTANCE_INTEROP_AUTH_MODE: "client_credentials"
            INSTANCE_INTEROP_HOSTNAME: "admeinterop.energy.azure.com"
            INSTANCE_INTEROP_DATA_PARTITION_ID: "opendes"
            INSTANCE_INTEROP_AUTHORITY: "osdu"
            INSTANCE_INTEROP_SCHEMA_SOURCE: "wks"
            INSTANCE_INTEROP_TOKEN_URL: "https://login.microsoftonline.com/58975fd3-4977-44d0-bea8-37af0baac100/oauth2/v2.0/token"
            INSTANCE_INTEROP_DEFAULT_LEGAL_TAG: "opendes-private-default"
            INSTANCE_INTEROP_DEFAULT_OWNERS: "data.default.owners@opendes.dataservices.energy"
            INSTANCE_INTEROP_DEFAULT_VIEWERS: "data.default.viewers@opendes.dataservices.energy"
            INSTANCE_INTEROP_DEFAULT_COUNTRIES: "NO"
          monitoring: true
          horizontalScaling:
            minReplicas: 2
            maxReplicas: 4
            triggers:
              - name: cpu
                cpu:
                  value: 70

      # Secrets - set via Radix Console
      secrets:
        - SECRET_KEY
        - SMDA_API_KEY
        - SMDA_CLIENT_ID
        - SMDA_SCOPE
        - INSTANCE_EQNDEV_TENANT_ID
        - INSTANCE_EQNDEV_CLIENT_ID
        - INSTANCE_EQNDEV_CLIENT_SECRET
        - INSTANCE_EQNDEV_SCOPE
        - INSTANCE_PRESHIP_TENANT_ID
        - INSTANCE_PRESHIP_CLIENT_ID
        - INSTANCE_PRESHIP_CLIENT_SECRET
        - INSTANCE_PRESHIP_SCOPE
        - INSTANCE_INTEROP_TENANT_ID
        - INSTANCE_INTEROP_CLIENT_ID
        - INSTANCE_INTEROP_CLIENT_SECRET
        - INSTANCE_INTEROP_SCOPE

      # Health probes
      readinessProbe:
        httpGet:
          path: /weco/health
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /weco/health
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 30

  # ── DNS / Custom alias (optional - configure in Radix Console) ─────
  # dnsAppAlias:
  #   environment: prod
  #   component: web

  # ── Jobs: heavy WeCo correlation (offloaded from web component) ────
  jobs:
    - name: weco-correlation
      src: "."
      dockerfileName: Dockerfile.weco-job
      schedulerPort: 8001
      payload:
        path: /input
      resources:
        requests:
          cpu: "1000m"
          memory: "2Gi"
        limits:
          cpu: "4000m"
          memory: "8Gi"
      environmentConfig:
        - environment: dev
          variables:
            LOG_LEVEL: "INFO"
            WECO_MAX_COR: "50"
            WECO_THREAD: "4"
        - environment: prod
          variables:
            LOG_LEVEL: "WARNING"
            WECO_MAX_COR: "50"
            WECO_THREAD: "4"
      # Radix auto-stops idle jobs after timeLimitSeconds
      timeLimitSeconds: 600

  # ── Private image hubs (not needed - Radix builds from source) ─────
  # privateImageHubs: {}
