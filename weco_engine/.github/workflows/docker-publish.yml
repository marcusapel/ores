# §5.2 — Docker image build and publish
# PRs: build only (validate Dockerfile). Pushes/releases: build + push to GHCR.
name: Docker Publish

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "include/**"
      - "weco/**"
  pull_request:
    paths:
      - "Dockerfile"
      - "src/**"
      - "include/**"
      - "weco/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Preflight — verify registry credentials available
        if: github.event_name != 'pull_request'
        run: |
          if [[ -z "${{ secrets.GITHUB_TOKEN }}" ]]; then
            echo "::error::GITHUB_TOKEN secret is not available — cannot push to registry"
            exit 1
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
