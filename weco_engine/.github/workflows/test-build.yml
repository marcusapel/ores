name: build-test

on: push

jobs:
  linux-build:
    name: Linux Build Py${{ matrix.pyver }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        pyver: [ "3.12" ]
    env:
      PYVER: ${{ matrix.pyver }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pyver }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: linux-build
        run: |
          python -m pip install build pytest pytest-timeout scikit-build-core pybind11 fastapi httpx python-multipart
          python -m pip install -e .
          WeCoCheck -g
          pytest --ignore=pytest/test_rddms.py --timeout=120
          python -m build --wheel
          python -m build --sdist
          echo $GITHUB_REF > dist/ref
          echo $GITHUB_SHA >> dist/ref
      - uses: actions/upload-artifact@v4
        with:
          name: Linux${{ matrix.pyver }}
          path: dist/*

  windows-build:
    name: Windows Build Py${{ matrix.pyver }} ${{ matrix.config.name }}
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        pyver: [ "3.12" ]
        config:
          - { gen: "-G \"Visual Studio 17 2022\" -A x64", name: "VS17" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pyver }}

      - name: window-build
        shell: bash
        run: |
          python -m pip install build pytest pytest-timeout scikit-build-core pybind11 fastapi httpx python-multipart
          python -m pip install -e .
          WeCoCheck -g
          pytest --ignore=pytest/test_rddms.py --timeout=120
          python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: Windows${{ matrix.pyver }}
          path: dist/*.whl
