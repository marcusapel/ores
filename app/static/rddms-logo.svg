<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dce6f0"/>
    </linearGradient>
    <!-- Property gradient: porosity/permeability green→yellow→red -->
    <linearGradient id="prop" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="25%" stop-color="#43a047"/>
      <stop offset="50%" stop-color="#fdd835"/>
      <stop offset="75%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <!-- Right face - darker shade -->
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#8b3a0a"/>
    </linearGradient>
    <!-- Well gradient -->
    <linearGradient id="wellG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="56" ry="56" fill="url(#bg)" stroke="#b0bec5" stroke-width="4"/>

  <!-- ═══════════════════════════════════════════════════════
       3D RESERVOIR BLOCK — shifted up 40px, no top face
       Two back walls + front face + right face
       ═══════════════════════════════════════════════════════ -->

  <!-- ── Back walls ── -->
  <!-- Back-left wall (behind front face) -->
  <polygon points="100,120 310,20 310,200 100,300"
           fill="#8d6e63" opacity="0.25"/>
  <!-- Back-right wall (behind right face) -->
  <polygon points="310,20 490,120 490,300 310,200"
           fill="#6d4c41" opacity="0.25"/>

  <!-- ── FRONT FACE — property gradient (porosity/perm) ── -->
  <polygon points="100,140 310,40 310,300 100,400"
           fill="url(#prop)" opacity="0.95"/>

  <!-- Grid lines on front face — structured grid cells -->
  <g stroke="#1a3a5c" stroke-width="1.5" opacity="0.25">
    <!-- Horizontal layers (horizons) -->
    <line x1="100" y1="205" x2="310" y2="105"/>
    <line x1="100" y1="270" x2="310" y2="170"/>
    <line x1="100" y1="335" x2="310" y2="235"/>
    <!-- Vertical columns -->
    <line x1="152" y1="114" x2="152" y2="374"/>
    <line x1="205" y1="88" x2="205" y2="348"/>
    <line x1="257" y1="62" x2="257" y2="322"/>
  </g>

  <!-- ── RIGHT FACE — side view, darker ── -->
  <polygon points="310,40 490,140 490,320 310,300"
           fill="url(#rightFace)" opacity="0.7"/>

  <!-- Grid on right face — layers visible on side -->
  <g stroke="#1a3a5c" stroke-width="1.5" opacity="0.2">
    <line x1="310" y1="105" x2="490" y2="205"/>
    <line x1="310" y1="170" x2="490" y2="270"/>
    <line x1="310" y1="235" x2="490" y2="320"/>
    <line x1="370" y1="70" x2="370" y2="305"/>
    <line x1="430" y1="105" x2="430" y2="315"/>
  </g>

  <!-- ── Bottom face outline ── -->
  <polygon points="100,400 310,300 490,320 280,420"
           fill="none" stroke="#5d4037" stroke-width="2" opacity="0.3"/>

  <!-- ═══ FAULT — red plane cutting through block ═══ -->
  <polygon points="340,32 220,385 260,405 380,52"
           fill="#d32f2f" opacity="0.25"/>
  <line x1="340" y1="32" x2="220" y2="385"
        stroke="#d32f2f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="380" y1="52" x2="260" y2="405"
        stroke="#d32f2f" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- ═══ WELL TRAJECTORY — deviated well path through block ═══ -->
  <path d="M160 16 L160 80 Q160 140 178 195 Q196 250 206 310 L212 390"
        fill="none" stroke="url(#wellG)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Well markers (formation tops — where well crosses horizons) -->
  <g fill="#ffffff" stroke="#0277bd" stroke-width="3">
    <circle cx="160" cy="80" r="7"/>
    <circle cx="173" cy="170" r="7"/>
    <circle cx="195" cy="255" r="7"/>
    <circle cx="208" cy="340" r="7"/>
  </g>

  <!-- ═══ Text: R DDMS ═══ -->
  <text x="60" y="490"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="86" font-weight="900"
        fill="#1a3a5c">R</text>
  <text x="148" y="490"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-size="50" font-weight="800" letter-spacing="6"
        fill="#1a3a5c">DDMS</text>
</svg>
