<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sign In — ORES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: 'Equinor', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; background: #FAFAFA; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.10); padding: 52px 44px; text-align: center; max-width: 380px; width: 100%; border-top: 4px solid #FF1243; }
    h1 { color: #333; font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
    h1 span { color: #FF1243; }
    p { color: #6F6F6F; font-size: 14px; margin: 0 0 28px; line-height: 1.5; }
    .btn-login { display: inline-block; padding: 12px 36px; background: #FF1243; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .15s; }
    .btn-login:hover { background: #D6002B; }
    .note { color: #999; font-size: 12px; margin-top: 24px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>ORES</span> — OSDU Explorer</h1>
    <p>Sign in with your Equinor account to continue.</p>
    <a class="btn-login" href="/login">Sign in with Microsoft</a>
    <div class="note">Uses Azure AD with PKCE — no passwords are stored by this app.</div>
  </div>
</body>
</html>
