apiVersion: apps/v1
kind: Deployment
metadata:
  name: ores
  namespace: ores
  labels:
    app.kubernetes.io/name: ores
    app.kubernetes.io/version: "m1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ores
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ores
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ores
          image: IMAGE_PLACEHOLDER          # replaced by CI: <acr>.azurecr.io/ores:<tag>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ores-config
            - secretRef:
                name: ores-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /login-page
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login-page
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      imagePullSecrets:
        - name: acr-pull-secret              # create via: kubectl create secret docker-registry acr-pull-secret ...
