apiVersion: v1
kind: Secret
metadata:
  name: ores-secrets
  namespace: ores
  labels:
    app.kubernetes.io/name: ores
type: Opaque
stringData:
  # ── Generate a strong random key: python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "CHANGE-ME-generate-a-32-byte-hex"

  # ── Azure AD (for PKCE user login) ──
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_SCOPE: ""

  # ── Optional: shared env token (bypasses per-user login) ──
  # REFRESH_TOKEN: ""
