apiVersion: v1
kind: Secret
metadata:
  name: ores-secrets
  namespace: ores
  labels:
    app.kubernetes.io/name: ores
type: Opaque
stringData:
  # ── Session signing key ──
  # Generate: python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "CHANGE-ME"

  # ── Azure AD — OSDU PKCE login ──
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_SCOPE: ""

  # ── Optional: shared env refresh token (bypasses per-user login) ──
  REFRESH_TOKEN: ""

  # ── SMDA (stratigraphic column service) ──
  SMDA_CLIENT_ID: ""
  SMDA_SCOPE: ""
  SMDA_API_KEY: ""
