apiVersion: v1
kind: ConfigMap
metadata:
  name: ores-config
  namespace: ores
  labels:
    app.kubernetes.io/name: ores
data:
  # ── Server ──
  LOG_LEVEL: "INFO"
  DEBUG: "False"

  # ── OSDU / RDDMS ──
  OSDU_BASE_URL: "equinordev.energy.azure.com"
  DATA_PARTITION_ID: "dev"
  DEFAULT_DATASPACE: "maap/drogon"
  DEFAULT_LEGAL_TAG: "dev-equinor-private-default"
  DEFAULT_COUNTRIES: "NO"
  DEFAULT_OWNERS: "data.default.owners@dev.dataservices.energy"
  DEFAULT_VIEWERS: "data.default.viewers@dev.dataservices.energy"
  APP_KEY: "test-app"

  # ── Auth redirect (set when behind a reverse proxy / ingress) ──
  # OIDC_REDIRECT_URI: "https://ores.equinor.com/auth/callback"
